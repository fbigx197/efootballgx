<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jugadores - GX eFootball Federation</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;

background-image:url("fondo.jpg");
background-size:cover;
background-position:center;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
z-index:-1;
}

h1{
text-align:center;
margin-top:40px;
font-size:40px;
}

/* GRID */

.playersGrid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
margin-top:40px;
}

/* TARJETAS */

.card{

width:220px;
height:260px;

background:linear-gradient(135deg,#111827,#1f2937);

border-radius:18px;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

cursor:pointer;

transition:0.3s;

}

.card:hover{

transform:scale(1.08);
background:#2563eb;

}

.card img{

width:80px;
height:80px;

border-radius:50%;
margin-bottom:10px;

}

.card h3{
margin:5px 0;
}

.card span{
opacity:0.8;
}

/* MODAL */

.modal{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.9);

display:none;

align-items:center;
justify-content:center;

}

.modalContent{

background:#111827;

padding:30px;

border-radius:20px;

width:90%;
max-width:900px;

}

/* HEADER */

.playerHeader{

display:flex;
align-items:center;
gap:20px;

margin-bottom:20px;

}

.playerHeader img{

width:80px;
height:80px;
border-radius:50%;

}

.playerHeader h2{
margin:0;
}

/* ESTADISTICAS */

.stats{

display:flex;
gap:20px;
margin-bottom:20px;
flex-wrap:wrap;

}

.stat{

background:#1f2937;
padding:10px 15px;
border-radius:10px;

}

/* CANCHA */

.field{

position:relative;

width:100%;
height:420px;

background:url("cancha.png");
background-size:cover;
border-radius:15px;

}

/* JUGADORES EN CANCHA */

.player{

position:absolute;

display:flex;
flex-direction:column;
align-items:center;

font-size:12px;

}

.player img{

width:70px;
margin-bottom:4px;

}

.player span{

background:#2563eb;
padding:4px 8px;
border-radius:8px;

}

/* BOTON */

.closeBtn{

margin-top:20px;

padding:10px 20px;

background:#ef4444;

border-radius:10px;

cursor:pointer;

display:inline-block;

}

</style>

</head>

<body>

<div class="overlay"></div>

<h1>Jugadores</h1>

<div class="playersGrid">

<div class="card" onclick="showPlayer('Juan')">

<img src="juan.jpg">
<h3>Juan</h3>
<span>Real Madrid</span>

</div>

<div class="card" onclick="showPlayer('Lucas')">

<img src="lucas.jpg">
<h3>Lucas</h3>
<span>Manchester City</span>

</div>

<div class="card" onclick="showPlayer('Mateo')">

<img src="mateo.jpg">
<h3>Mateo</h3>
<span>Barcelona</span>

</div>

</div>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="modalContent">

<div class="playerHeader">

<img id="playerPhoto">

<div>
<h2 id="playerName"></h2>
<div id="playerTeam"></div>
</div>

</div>

<div class="stats" id="stats"></div>

<div class="field" id="field"></div>

<div class="closeBtn" onclick="closeModal()">Cerrar</div>

</div>

</div>

<script>

/* LISTA DE CARTAS AUTOMATICAS */

const playerCards={

"Vinicius":"vinicius.webp",
"Haaland":"haaland.webp",
"Messi":"messi.webp",
"Pedri":"pedri.webp",
"De Jong":"dejong.webp",
"Bellingham":"bellingham.webp",
"Theo":"theo.webp",
"VVD":"vvd.webp",
"Araujo":"araujo.webp",
"Walker":"walker.webp",
"Courtois":"courtois.webp",

"Mbappe":"mbappe.webp",
"Neymar":"neymar.webp",
"De Bruyne":"debruyne.webp",
"Salah":"salah.webp",
"Rodri":"rodri.webp",
"Kroos":"kroos.webp",
"Davies":"davies.webp",
"Dias":"dias.webp",
"Rudiger":"rudiger.webp",
"Cancelo":"cancelo.webp",
"Ter Stegen":"terstegen.webp"

}

/* JUGADORES */

const players={

Juan:{

team:"Real Madrid",

photo:"juan.jpg",

stats:{
victorias:12,
empates:3,
derrotas:4,
goles:32
},

formation:[

{name:"Vinicius",x:20,y:60},
{name:"Haaland",x:45,y:60},
{name:"Messi",x:70,y:60},

{name:"Pedri",x:25,y:40},
{name:"De Jong",x:45,y:40},
{name:"Bellingham",x:65,y:40},

{name:"Theo",x:10,y:20},
{name:"VVD",x:35,y:20},
{name:"Araujo",x:55,y:20},
{name:"Walker",x:80,y:20},

{name:"Courtois",x:45,y:5}

]

},

Lucas:{

team:"Manchester City",

photo:"lucas.jpg",

stats:{
victorias:10,
empates:5,
derrotas:2,
goles:28
},

formation:[

{name:"Mbappe",x:45,y:60},

{name:"Neymar",x:25,y:50},
{name:"De Bruyne",x:45,y:50},
{name:"Salah",x:65,y:50},

{name:"Rodri",x:35,y:35},
{name:"Kroos",x:55,y:35},

{name:"Davies",x:10,y:20},
{name:"Dias",x:35,y:20},
{name:"Rudiger",x:55,y:20},
{name:"Cancelo",x:80,y:20},

{name:"Ter Stegen",x:45,y:5}

]

}

}

function showPlayer(name){

const p=players[name]

document.getElementById("modal").style.display="flex"

document.getElementById("playerName").innerText=name
document.getElementById("playerTeam").innerText=p.team
document.getElementById("playerPhoto").src=p.photo

let statsHTML=""

for(let s in p.stats){

statsHTML+=`<div class="stat">${s}: ${p.stats[s]}</div>`

}

document.getElementById("stats").innerHTML=statsHTML

let field=document.getElementById("field")

field.innerHTML=""

p.formation.forEach(pl=>{

let div=document.createElement("div")

div.className="player"

if(playerCards[pl.name]){

div.innerHTML=`
<img src="${playerCards[pl.name]}">
<span>${pl.name}</span>
`

}else{

div.innerHTML=`<span>${pl.name}</span>`

}

div.style.left=pl.x+"%"
div.style.bottom=pl.y+"%"

field.appendChild(div)

})

}

function closeModal(){

document.getElementById("modal").style.display="none"

}

</script>

</body>

</html>
