<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jugadores - GX eFootball Federation</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
color:white;

/* AQUÍ PON TU FONDO */
background-image:url("fondo.jpg");

background-size:cover;
background-position:center;
overflow-x:hidden;
min-height:100vh;
animation:fadePage 1s ease;
}

@keyframes fadePage{
from{opacity:0; transform:translateY(20px)}
to{opacity:1; transform:translateY(0)}
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
z-index:-1;
}

/* BOTON */

.backButton{
position:absolute;
top:20px;
left:20px;
background:#1e293b;
padding:10px 18px;
border-radius:12px;
text-decoration:none;
color:white;
transition:0.25s;
border:1px solid rgba(255,255,255,0.1);
}

.backButton:hover{
background:#2563eb;
transform:scale(1.05);
box-shadow:0 0 15px rgba(37,99,235,0.6);
}

h1{
text-align:center;
margin-top:40px;
font-size:42px;
letter-spacing:3px;
text-shadow:0 0 20px #2563eb;
}

/* GRID */

.playersGrid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:35px;
margin-top:50px;
}

.card{
width:220px;
height:260px;
background:linear-gradient(145deg,#020617,#0f172a);
border-radius:18px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
transition:0.35s;
}

.card:hover{
transform:scale(1.08);
box-shadow:0 0 25px rgba(37,99,235,0.6);
}

.card img{
width:90px;
height:90px;
border-radius:50%;
margin-bottom:12px;
}

.card span{
opacity:0.8;
font-size:14px;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
overflow-y:auto;
padding:40px 0;
}

.modalContent{
background:#111827;
padding:30px;
border-radius:20px;
width:92%;
max-width:1200px;
margin:auto;
}

.field{
position:relative;
width:100%;
height:720px;
background:url("cancha.png");
background-size:cover;
background-position:center;
border-radius:20px;
}

/* MINI PLAYER */

.playerMini{
position:fixed;
bottom:20px;
right:20px;
width:320px;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(6px);
border-radius:15px;
padding:12px;
display:flex;
flex-direction:column;
gap:10px;
}

.playerTop{
display:flex;
align-items:center;
gap:12px;
}

.playerMini img{
width:45px;
height:45px;
border-radius:8px;
object-fit:cover;
}

.songInfo{
flex:1;
font-size:13px;
}

.songTitle{
font-weight:bold;
font-size:14px;
}

.playerControls{
display:flex;
gap:6px;
}

.ctrlBtn{
background:#111827;
border:none;
color:white;
font-size:16px;
padding:6px 8px;
border-radius:6px;
cursor:pointer;
}

.ctrlBtn:hover{
background:#3b82f6;
}

.progressBar{
width:100%;
}

.time{
display:flex;
justify-content:space-between;
font-size:11px;
opacity:0.8;
}

.volumeControl{
display:flex;
align-items:center;
gap:8px;
font-size:12px;
}

.volumeControl input{
width:100%;
}

</style>

</head>

<body>

<div class="overlay"></div>

<a class="backButton" href="menu.html">
← Volver al menú
</a>

<audio id="music"></audio>

<h1>Jugadores</h1>

<div class="playersGrid">

<div class="card">
<img src="juan.jpg">
<h3>Juan</h3>
<span>Real Madrid</span>
</div>

<div class="card">
<img src="lucas.jpg">
<h3>Lucas</h3>
<span>Manchester City</span>
</div>

<div class="card">
<img src="mateo.jpg">
<h3>Mateo</h3>
<span>Barcelona</span>
</div>

</div>

<!-- MINI PLAYER -->

<div class="playerMini">

<div class="playerTop">

<img id="cover" src="badbunny.png">

<div class="songInfo">
<div>Reproduciendo:</div>
<div class="songTitle" id="songTitle">Cargando...</div>
</div>

<div class="playerControls">
<button class="ctrlBtn" onclick="prevSong()">⏮</button>
<button class="ctrlBtn" onclick="togglePlay()">⏯</button>
<button class="ctrlBtn" onclick="nextSong()">⏭</button>
</div>

</div>

<input type="range" id="progress" class="progressBar" value="0" step="1">

<div class="time">
<span id="currentTime">0:00</span>
<span id="duration">0:00</span>
</div>

<div class="volumeControl">
🔊
<input type="range" min="0" max="1" step="0.01" value="0.6" onchange="setVolume(this.value)">
</div>

</div>

<script>

/* PLAYER */

let music=document.getElementById("music")
let progress=document.getElementById("progress")

let songs=[

{title:"Bad Bunny - EoO",file:"eoo.mp3",cover:"badbunny.png"},
{title:"Bad Bunny - Baile Inolvidable",file:"baile.mp3",cover:"badbunny.png"},
{title:"Fuerza Regida - Coqueta",file:"COQUETA.mp3",cover:"coqueta.jfif"},
{title:"Bad Bunny - NUEVAYoL",file:"NUEVAYoL.mp3",cover:"badbunny.png"},
{title:"Michel Telo - Ai se eu te peg",file:"mosa.mp3",cover:"mosa.jfif"}

]

let currentSong=parseInt(localStorage.getItem("songIndex"))||0
let savedTime=parseFloat(localStorage.getItem("songTime"))||0
let playing=false

function loadSong(){

music.src=songs[currentSong].file

document.getElementById("songTitle").innerText=songs[currentSong].title
document.getElementById("cover").src=songs[currentSong].cover

music.currentTime=savedTime

music.play()
playing=true

}

function nextSong(){

currentSong++
if(currentSong>=songs.length) currentSong=0

savedTime=0
loadSong()

}

function prevSong(){

currentSong--
if(currentSong<0) currentSong=songs.length-1

savedTime=0
loadSong()

}

function togglePlay(){

if(playing){
music.pause()
playing=false
}else{
music.play()
playing=true
}

}

function setVolume(v){
music.volume=v
}

music.addEventListener("timeupdate",function(){

progress.value=music.currentTime

document.getElementById("currentTime").innerText=formatTime(music.currentTime)
document.getElementById("duration").innerText=formatTime(music.duration)

localStorage.setItem("songIndex",currentSong)
localStorage.setItem("songTime",music.currentTime)

})

music.addEventListener("loadedmetadata",function(){
progress.max=music.duration
})

progress.addEventListener("input",function(){
music.currentTime=progress.value
})

music.addEventListener("ended",function(){
nextSong()
})

function formatTime(t){

if(isNaN(t)) return "0:00"

let m=Math.floor(t/60)
let s=Math.floor(t%60)

if(s<10) s="0"+s

return m+":"+s

}

loadSong()
music.volume=0.6

</script>

</body>
</html>
