<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jugadores - GX eFootball Federation</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
background-image:url("fondo.jpg");
background-size:cover;
background-position:center;
overflow-x:hidden;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
z-index:-1;
}

h1{
text-align:center;
margin-top:40px;
font-size:40px;
}

/* GRID */

.playersGrid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
margin-top:40px;
}

/* TARJETAS */

.card{
width:220px;
height:260px;
background:linear-gradient(135deg,#111827,#1f2937);
border-radius:18px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.08);
background:#2563eb;
}

.card img{
width:80px;
height:80px;
border-radius:50%;
margin-bottom:10px;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
overflow-y:auto;
padding:40px 0;
}

/* CONTENIDO */

.modalContent{
background:#111827;
padding:30px;
border-radius:20px;
width:92%;
max-width:1200px;
margin:auto;
}

/* HEADER */

.playerHeader{
display:flex;
align-items:center;
gap:20px;
margin-bottom:20px;
}

.playerHeader img{
width:80px;
height:80px;
border-radius:50%;
}

/* ESTADISTICAS */

.stats{
display:flex;
gap:20px;
margin-bottom:20px;
flex-wrap:wrap;
}

.stat{
background:#1f2937;
padding:10px 15px;
border-radius:10px;
}

/* CANCHA */

.field{
position:relative;
width:100%;
height:720px;
background:url("cancha.png");
background-size:cover;
background-position:center;
border-radius:20px;
}

/* JUGADORES */

.player{
position:absolute;
display:flex;
flex-direction:column;
align-items:center;
transform:translate(-50%,0);
}

/* CARTAS */

.player img{
width:55px;
margin-bottom:6px;
transition:transform 0.25s;
filter:drop-shadow(0 4px 6px rgba(0,0,0,0.7));
}

/* ZOOM HOVER */

.player img:hover{
transform:scale(1.8);
z-index:10;
}

/* NOMBRE */

.player span{
font-size:12px;
background:rgba(0,0,0,0.65);
padding:4px 8px;
border-radius:6px;
}

/* BOTON */

.closeBtn{
margin-top:20px;
padding:10px 20px;
background:#ef4444;
border-radius:10px;
cursor:pointer;
display:inline-block;
}

/* MINI PLAYER */

.playerMini{
position:fixed;
bottom:20px;
right:20px;
width:320px;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(6px);
border-radius:15px;
padding:12px;
display:flex;
flex-direction:column;
gap:10px;
}

.playerTop{
display:flex;
align-items:center;
gap:12px;
}

.playerMini img{
width:45px;
height:45px;
border-radius:8px;
}

.songInfo{
flex:1;
font-size:13px;
}

.songTitle{
font-weight:bold;
font-size:14px;
}

.playerControls{
display:flex;
gap:6px;
}

.ctrlBtn{
background:#111827;
border:none;
color:white;
font-size:16px;
padding:6px 8px;
border-radius:6px;
cursor:pointer;
}

.progressBar{
width:100%;
}

.time{
display:flex;
justify-content:space-between;
font-size:11px;
}

.volumeControl{
display:flex;
align-items:center;
gap:8px;
font-size:12px;
}

</style>

</head>

<body>

<div class="overlay"></div>

<h1>Jugadores</h1>

<!-- AUDIO GLOBAL -->

<audio id="music"></audio>

<div class="playersGrid">

<div class="card" onclick="showPlayer('Juan')">
<img src="juan.jpg">
<h3>Juan</h3>
<span>Real Madrid</span>
</div>

<div class="card" onclick="showPlayer('Lucas')">
<img src="lucas.jpg">
<h3>Lucas</h3>
<span>Manchester City</span>
</div>

</div>

<div class="modal" id="modal">

<div class="modalContent">

<div class="playerHeader">

<img id="playerPhoto">

<div>
<h2 id="playerName"></h2>
<div id="playerTeam"></div>
</div>

</div>

<div class="stats" id="stats"></div>

<div class="field" id="field"></div>

<div class="closeBtn" onclick="closeModal()">Cerrar</div>

</div>

</div>

<!-- MINI PLAYER -->

<div class="playerMini">

<div class="playerTop">

<img id="cover" src="badbunny.png">

<div class="songInfo">
<div>Reproduciendo:</div>
<div class="songTitle" id="songTitle">Cargando...</div>
</div>

<div class="playerControls">
<button class="ctrlBtn" onclick="prevSong()">⏮</button>
<button class="ctrlBtn" onclick="togglePlay()">⏯</button>
<button class="ctrlBtn" onclick="nextSong()">⏭</button>
</div>

</div>

<input type="range" id="progress" class="progressBar" value="0">

<div class="time">
<span id="currentTime">0:00</span>
<span id="duration">0:00</span>
</div>

<div class="volumeControl">
🔊
<input type="range" min="0" max="1" step="0.01" value="0.6" onchange="setVolume(this.value)">
</div>

</div>

<script>

/* AQUÍ VA TODO TU SCRIPT DE JUGADORES (el que ya tienes) */

</script>

<!-- PLAYER GLOBAL -->

<script src="player.js"></script>

</body>
</html>
