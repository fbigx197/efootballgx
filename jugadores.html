<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jugadores - GX eFootball Federation</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
background-image:url("fondo.jpg");
background-size:cover;
background-position:center;
overflow-x:hidden;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
z-index:-1;
}

h1{
text-align:center;
margin-top:40px;
font-size:40px;
}

/* GRID */

.playersGrid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
margin-top:40px;
}

/* TARJETAS */

.card{
width:220px;
height:260px;
background:linear-gradient(135deg,#111827,#1f2937);
border-radius:18px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.08);
background:#2563eb;
}

.card img{
width:80px;
height:80px;
border-radius:50%;
margin-bottom:10px;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
overflow-y:auto;
padding:40px 0;
}

/* CONTENIDO */

.modalContent{
background:#111827;
padding:30px;
border-radius:20px;
width:92%;
max-width:1200px;
margin:auto;
}

/* HEADER */

.playerHeader{
display:flex;
align-items:center;
gap:20px;
margin-bottom:20px;
}

.playerHeader img{
width:80px;
height:80px;
border-radius:50%;
}

/* ESTADISTICAS */

.stats{
display:flex;
gap:20px;
margin-bottom:20px;
flex-wrap:wrap;
}

.stat{
background:#1f2937;
padding:10px 15px;
border-radius:10px;
}

/* CANCHA */

.field{
position:relative;
width:100%;
height:720px;
background:url("cancha.png");
background-size:cover;
background-position:center;
border-radius:20px;
}

/* JUGADORES */

.player{
position:absolute;
display:flex;
flex-direction:column;
align-items:center;
transform:translate(-50%,0);
}

/* CARTAS */

.player img{
width:55px;
margin-bottom:6px;
transition:transform 0.25s;
filter:drop-shadow(0 4px 6px rgba(0,0,0,0.7));
}

/* ZOOM HOVER */

.player img:hover{
transform:scale(1.8);
z-index:10;
}

/* NOMBRE */

.player span{
font-size:12px;
background:rgba(0,0,0,0.65);
padding:4px 8px;
border-radius:6px;
}

/* BOTON */

.closeBtn{
margin-top:20px;
padding:10px 20px;
background:#ef4444;
border-radius:10px;
cursor:pointer;
display:inline-block;
}

</style>

</head>

<body>

<div class="overlay"></div>

<h1>Jugadores</h1>

<div class="playersGrid">

<div class="card" onclick="showPlayer('Juan')">
<img src="juan.jpg">
<h3>Juan</h3>
<span>Real Madrid</span>
</div>

<div class="card" onclick="showPlayer('Lucas')">
<img src="lucas.jpg">
<h3>Lucas</h3>
<span>Manchester City</span>
</div>

<div class="card" onclick="showPlayer('Mateo')">
<img src="mateo.jpg">
<h3>Mateo</h3>
<span>Barcelona</span>
</div>

</div>

<div class="modal" id="modal">

<div class="modalContent">

<div class="playerHeader">

<img id="playerPhoto">

<div>
<h2 id="playerName"></h2>
<div id="playerTeam"></div>
</div>

</div>

<div class="stats" id="stats"></div>

<div class="field" id="field"></div>

<div class="closeBtn" onclick="closeModal()">Cerrar</div>

</div>

</div>

<script>

/* CARTAS */

const playerCards={

"Vinicius":"vinicius.webp",
"Haaland":"haaland.webp",
"Messi":"messi.webp",
"Pedri":"pedri.webp",
"De Jong":"dejong.webp",
"Bellingham":"bellingham.webp",
"Theo":"theo.webp",
"VVD":"vvd.webp",
"Araujo":"araujo.webp",
"Walker":"walker.webp",
"Courtois":"courtois.webp",

"Mbappe":"mbappe.webp",
"Neymar":"neymar.webp",
"De Bruyne":"debruyne.webp",
"Salah":"salah.webp",
"Rodri":"rodri.webp",
"Kroos":"kroos.webp",
"Davies":"davies.webp",
"Dias":"dias.webp",
"Rudiger":"rudiger.webp",
"Cancelo":"cancelo.webp",
"Ter Stegen":"terstegen.webp"

}

/* JUGADORES */

const players={

Juan:{

team:"Real Madrid",
photo:"juan.jpg",

stats:{
victorias:12,
empates:3,
derrotas:4,
goles:32
},

formation:[

{name:"Vinicius",x:20,y:80},
{name:"Haaland",x:50,y:80},
{name:"Messi",x:80,y:80},

{name:"Pedri",x:25,y:60},
{name:"De Jong",x:50,y:60},
{name:"Bellingham",x:75,y:60},

{name:"Theo",x:12,y:38},
{name:"VVD",x:35,y:38},
{name:"Araujo",x:65,y:38},
{name:"Walker",x:88,y:38},

{name:"Courtois",x:50,y:10}

]

},

Lucas:{

team:"Manchester City",
photo:"lucas.jpg",

stats:{
victorias:10,
empates:5,
derrotas:2,
goles:28
},

formation:[

{name:"Mbappe",x:50,y:80},

{name:"Neymar",x:25,y:60},
{name:"De Bruyne",x:50,y:60},
{name:"Salah",x:75,y:60},

{name:"Rodri",x:35,y:45},
{name:"Kroos",x:65,y:45},

{name:"Davies",x:12,y:36},
{name:"Dias",x:35,y:36},
{name:"Rudiger",x:65,y:36},
{name:"Cancelo",x:88,y:36},

{name:"Ter Stegen",x:50,y:10}

]

}

}

function showPlayer(name){

const p=players[name]

document.getElementById("modal").style.display="block"

document.getElementById("playerName").innerText=name
document.getElementById("playerTeam").innerText=p.team
document.getElementById("playerPhoto").src=p.photo

let statsHTML=""

for(let s in p.stats){
statsHTML+=`<div class="stat">${s}: ${p.stats[s]}</div>`
}

document.getElementById("stats").innerHTML=statsHTML

let field=document.getElementById("field")
field.innerHTML=""

p.formation.forEach(pl=>{

let div=document.createElement("div")
div.className="player"

if(playerCards[pl.name]){
div.innerHTML=`
<img src="${playerCards[pl.name]}">
<span>${pl.name}</span>
`
}else{
div.innerHTML=`<span>${pl.name}</span>`
}

div.style.left=pl.x+"%"
div.style.bottom=pl.y+"%"

field.appendChild(div)

})

}

function closeModal(){
document.getElementById("modal").style.display="none"
}

</script>

</body>
</html>
