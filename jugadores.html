<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jugadores - GX eFootball Federation</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
color:white;
background-image:url("fondo.avif");
background-size:cover;
background-position:center;
overflow-x:hidden;
min-height:100vh;
animation:fadePage 1s ease;
position:relative;
z-index:1;
}

@keyframes fadePage{
from{opacity:0; transform:translateY(20px)}
to{opacity:1; transform:translateY(0)}
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
z-index:0;
pointer-events:none;
}  

.backButton{
position:absolute;
top:20px;
left:20px;
background:#1e293b;
padding:10px 18px;
border-radius:12px;
text-decoration:none;
color:white;
transition:0.25s;
border:1px solid rgba(255,255,255,0.1);
}

.backButton:hover{
background:#2563eb;
transform:scale(1.05);
box-shadow:0 0 15px rgba(37,99,235,0.6);
}

h1{
text-align:center;
margin-top:40px;
font-size:42px;
letter-spacing:3px;
text-shadow:0 0 20px #2563eb;
}

/* GRID */

.playersGrid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:35px;
margin-top:50px;
}

.card{
width:220px;
height:260px;
background:linear-gradient(145deg,#020617,#0f172a);
border-radius:18px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
transition:0.35s;
}

.card:hover{
transform:scale(1.08);
box-shadow:0 0 25px rgba(37,99,235,0.6);
}

.card img{
width:90px;
height:90px;
border-radius:50%;
margin-bottom:12px;
}

.card span{
opacity:0.8;
font-size:14px;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
overflow-y:auto;
padding:40px 0;
}

.modalContent{
background:#111827;
padding:30px;
border-radius:20px;
width:92%;
max-width:1200px;
margin:auto;
}

.playerHeader{
display:flex;
align-items:center;
gap:20px;
margin-bottom:20px;
}

.playerHeader img{
width:80px;
height:80px;
border-radius:50%;
}

.stats{
display:flex;
gap:20px;
margin-bottom:20px;
flex-wrap:wrap;
}

.stat{
background:#1f2937;
padding:10px 15px;
border-radius:10px;
}

.field{
position:relative;
width:100%;
height:720px;
background:url("cancha.png");
background-size:cover;
background-position:center;
border-radius:20px;
}

.player{
position:absolute;
display:flex;
flex-direction:column;
align-items:center;
transform:translate(-50%,0);
}

.player img{
width:55px;
margin-bottom:6px;
transition:transform 0.25s;
filter:drop-shadow(0 4px 6px rgba(0,0,0,0.7));
}

.player img:hover{
transform:scale(1.8);
z-index:10;
}

.player span{
font-size:12px;
background:rgba(0,0,0,0.65);
padding:4px 8px;
border-radius:6px;
}

.closeBtn{
margin-top:20px;
padding:10px 20px;
background:#ef4444;
border-radius:10px;
cursor:pointer;
display:inline-block;
}

/* MINI PLAYER */

.playerMini{
position:fixed;
bottom:20px;
right:20px;
width:320px;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(6px);
border-radius:15px;
padding:12px;
display:flex;
flex-direction:column;
gap:10px;
}

.playerTop{
display:flex;
align-items:center;
gap:12px;
}

.playerMini img{
width:45px;
height:45px;
border-radius:8px;
object-fit:cover;
}

.songInfo{
flex:1;
font-size:13px;
}

.songTitle{
font-weight:bold;
font-size:14px;
}

.playerControls{
display:flex;
gap:6px;
}

.ctrlBtn{
background:#111827;
border:none;
color:white;
font-size:16px;
padding:6px 8px;
border-radius:6px;
cursor:pointer;
}

.ctrlBtn:hover{
background:#3b82f6;
}

.progressBar{
width:100%;
}

.time{
display:flex;
justify-content:space-between;
font-size:11px;
opacity:0.8;
}

.volumeControl{
display:flex;
align-items:center;
gap:8px;
font-size:12px;
}

.volumeControl input{
width:100%;
}

</style>

</head>

<body>

<div class="overlay"></div>

<a class="backButton" href="menu.html">← Volver al menú</a>

<audio id="music"></audio>

<h1>Jugadores</h1>

<div class="playersGrid">

<div class="card" onclick="showPlayer('Law')">
<img src="barcelona.png">
<h3>Law</h3>
<span>FC Barcelona</span>
</div>

<div class="card" onclick="showPlayer('Lucas')">
<img src="lucas.jpg">
<h3>Lucas</h3>
<span>Manchester City</span>
</div>

</div>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="modalContent">

<div class="playerHeader">
<img id="playerPhoto">
<div>
<h2 id="playerName"></h2>
<div id="playerTeam"></div>
</div>
</div>

<div class="stats" id="stats"></div>

<div class="field" id="field"></div>

<div class="closeBtn" onclick="closeModal()">Cerrar</div>

</div>
</div>

<!-- MINI PLAYER -->

<div class="playerMini">

<div class="playerTop">

<img id="cover" src="badbunny.png">

<div class="songInfo">
<div>Reproduciendo:</div>
<div class="songTitle" id="songTitle">Cargando...</div>
</div>

<div class="playerControls">
<button class="ctrlBtn" onclick="prevSong()">⏮</button>
<button class="ctrlBtn" onclick="togglePlay()">⏯</button>
<button class="ctrlBtn" onclick="nextSong()">⏭</button>
</div>

</div>

<input type="range" id="progress" class="progressBar" value="0" step="1">

<div class="time">
<span id="currentTime">0:00</span>
<span id="duration">0:00</span>
</div>

<div class="volumeControl">
🔊
<input type="range" min="0" max="1" step="0.01" value="0.6" onchange="setVolume(this.value)">
</div>

</div>

<script>

/* CARTAS DE JUGADORES */

const playerCards={
"Vinicius":"vinicius.webp",
"Haaland":"haaland.webp",
"Messi":"messi.webp",
"Pedri":"pedri.webp",
"De Jong":"dejong.webp",
"Bellingham":"bellingham.webp",
"Theo":"theo.webp",
"VVD":"vvd.webp",
"Araujo":"araujo.webp",
"Walker":"walker.webp",
"Courtois":"courtois.webp",

"Mbappe":"mbappe.webp",
"Neymar":"neymar.webp",
"De Bruyne":"debruyne.webp",
"Salah":"salah.webp",
"Rodri":"rodri.webp",
"Kroos":"kroos.webp",
"Davies":"davies.webp",
"Dias":"dias.webp",
"Rudiger":"rudiger.webp",
"Cancelo":"cancelo.webp",
"Ter Stegen":"terstegen.webp"
}

/* DATOS DE JUGADORES */

const players={

Law :{
team:"FC Barcelona",
photo:"barcelona.png",
stats:{victorias:12,empates:3,derrotas:4,goles:32},

formation:[
{name:"Vinicius",x:20,y:80},
{name:"Haaland",x:50,y:80},
{name:"Messi",x:80,y:80},

{name:"Pedri",x:25,y:60},
{name:"De Jong",x:50,y:60},
{name:"Bellingham",x:75,y:60},

{name:"Theo",x:12,y:38},
{name:"VVD",x:35,y:38},
{name:"Araujo",x:65,y:38},
{name:"Walker",x:88,y:38},

{name:"Courtois",x:50,y:10}
]
},

Lucas:{
team:"Manchester City",
photo:"lucas.jpg",
stats:{victorias:10,empates:5,derrotas:2,goles:28},

formation:[
{name:"Mbappe",x:50,y:80},

{name:"Neymar",x:25,y:60},
{name:"De Bruyne",x:50,y:60},
{name:"Salah",x:75,y:60},

{name:"Rodri",x:35,y:45},
{name:"Kroos",x:65,y:45},

{name:"Davies",x:12,y:36},
{name:"Dias",x:35,y:36},
{name:"Rudiger",x:65,y:36},
{name:"Cancelo",x:88,y:36},

{name:"Ter Stegen",x:50,y:10}
]
}

}

/* MOSTRAR JUGADOR */

function showPlayer(name){

const p=players[name]

document.getElementById("modal").style.display="block"
document.getElementById("playerName").innerText=name
document.getElementById("playerTeam").innerText=p.team
document.getElementById("playerPhoto").src=p.photo

let statsHTML=""
for(let s in p.stats){
statsHTML+=`<div class="stat">${s}: ${p.stats[s]}</div>`
}

document.getElementById("stats").innerHTML=statsHTML

let field=document.getElementById("field")
field.innerHTML=""

p.formation.forEach(pl=>{

let div=document.createElement("div")
div.className="player"

if(playerCards[pl.name]){
div.innerHTML=`<img src="${playerCards[pl.name]}"><span>${pl.name}</span>`
}else{
div.innerHTML=`<span>${pl.name}</span>`
}

div.style.left=pl.x+"%"
div.style.bottom=pl.y+"%"

field.appendChild(div)

})

}

function closeModal(){
document.getElementById("modal").style.display="none"
}

/* PLAYER MUSICA SIN DESINCRONIZAR */

let music=document.getElementById("music")
let progress=document.getElementById("progress")

let songs=[
{title:"Bad Bunny - EoO",file:"eoo.mp3",cover:"badbunny.png"},
{title:"Bad Bunny - Baile Inolvidable",file:"baile.mp3",cover:"badbunny.png"},
{title:"Fuerza Regida - Coqueta",file:"COQUETA.mp3",cover:"coqueta.jfif"}
]

let currentSong=parseInt(localStorage.getItem("songIndex"))||0
let savedTime=parseFloat(localStorage.getItem("songTime"))||0
let playing=true

function loadSong(){

music.src=songs[currentSong].file

document.getElementById("songTitle").innerText=songs[currentSong].title
document.getElementById("cover").src=songs[currentSong].cover

music.currentTime=savedTime

music.play()

}

function nextSong(){

currentSong++
if(currentSong>=songs.length) currentSong=0

savedTime=0
loadSong()

}

function prevSong(){

currentSong--
if(currentSong<0) currentSong=songs.length-1

savedTime=0
loadSong()

}

function togglePlay(){

if(playing){
music.pause()
playing=false
}else{
music.play()
playing=true
}

}

function setVolume(v){
music.volume=v
}

music.addEventListener("timeupdate",function(){

progress.value=music.currentTime

document.getElementById("currentTime").innerText=formatTime(music.currentTime)
document.getElementById("duration").innerText=formatTime(music.duration)

localStorage.setItem("songIndex",currentSong)
localStorage.setItem("songTime",music.currentTime)

})

music.addEventListener("loadedmetadata",function(){
progress.max=music.duration
})

progress.addEventListener("input",function(){
music.currentTime=progress.value
})

music.addEventListener("ended",function(){
nextSong()
})

function formatTime(t){

if(isNaN(t)) return "0:00"

let m=Math.floor(t/60)
let s=Math.floor(t%60)

if(s<10) s="0"+s

return m+":"+s

}

loadSong()
music.volume=0.6

</script>

</body>
</html>
