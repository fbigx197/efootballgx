<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Torneo eFootball</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
}

/* VIDEO */

#introVideo{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
}

/* CIRCULO */

#loading{
position:fixed;
bottom:60px;
left:50%;
transform:translateX(-50%);
display:none;
flex-direction:column;
align-items:center;
cursor:pointer;
}

/* loader */

.loader{
width:70px;
height:70px;
border:7px solid #1e293b;
border-top:7px solid #2563eb;
border-radius:50%;
animation:spin 1s linear infinite;
}

/* animacion */

@keyframes spin{

0%{
transform:rotate(0deg);
}

100%{
transform:rotate(360deg);
}

}

.loading-text{
color:white;
margin-top:10px;
font-size:16px;
letter-spacing:2px;
}

</style>

</head>

<body>

<!-- VIDEO -->

<video id="introVideo" autoplay muted playsinline>
<source src="intro.mp4" type="video/mp4">
</video>

<!-- CIRCULO -->

<div id="loading" onclick="irMenu()">

<div class="loader"></div>

<div class="loading-text">
Pulsa para continuar
</div>

</div>

<script>

/* mostrar boton despues de 6 segundos */

setTimeout(function(){

document.getElementById("loading").style.display="flex";

},6000);

/* ir al menu */

function irMenu(){

window.location.href="menu.html";

}

</script>

</body>

</html>
