<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Torneo eFootball</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
}

/* VIDEO INTRO */

#introVideo{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
}

/* PANTALLA DE CARGA */

#loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
opacity:0;
transition:1s;
}

/* CIRCULO */

.loader{
width:80px;
height:80px;
border:8px solid #1e293b;
border-top:8px solid #2563eb;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{

0%{
transform:rotate(0deg);
}

100%{
transform:rotate(360deg);
}

}

.loading-text{
color:white;
margin-top:15px;
font-size:18px;
letter-spacing:2px;
}

</style>

</head>

<body>

<!-- VIDEO -->

<video id="introVideo" autoplay muted>
<source src="intro.mp4" type="video/mp4">
</video>

<!-- LOADING -->

<div id="loading">

<div class="loader"></div>

<div class="loading-text">
Cargando torneo...
</div>

</div>

<script>

/* CUANDO TERMINA EL VIDEO */

const video = document.getElementById("introVideo");
const loading = document.getElementById("loading");

video.onended = function(){

video.style.display = "none";

loading.style.opacity = "1";

/* ESPERA 3 SEGUNDOS Y ABRE MENU */

setTimeout(function(){

window.location.href = "menu.html";

},3000);

}

</script>

</body>

</html>
