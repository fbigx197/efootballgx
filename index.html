<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Torneo eFootball</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial, Helvetica, sans-serif;
}

/* VIDEO */

#introVideo{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* OVERLAY */

.overlay{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(
to bottom,
rgba(0,0,0,0.4),
rgba(0,0,0,0.7)
);
z-index:-1;
}

/* BOTON CONTINUAR */

#enterButton{

position:fixed;
bottom:70px;
left:50%;
transform:translateX(-50%);
display:none;
flex-direction:column;
align-items:center;
cursor:pointer;

}

/* CIRCULO */

.loader{

width:60px;
height:60px;

border:4px solid rgba(255,255,255,0.2);
border-top:4px solid white;

border-radius:50%;

animation:spin 1s linear infinite;

}

@keyframes spin{

0%{ transform:rotate(0deg); }
100%{ transform:rotate(360deg); }

}

/* TEXTO */

.enterText{

color:white;
margin-top:10px;
font-size:14px;
letter-spacing:3px;

}

/* BOTON MUSICA */

.musicButton{

position:fixed;
bottom:20px;
left:20px;

background:rgba(0,0,0,0.6);
color:white;

padding:10px 18px;

border-radius:20px;

font-size:14px;

cursor:pointer;

border:1px solid rgba(255,255,255,0.3);

transition:0.3s;

}

.musicButton:hover{

background:rgba(255,255,255,0.1);

}

</style>

</head>

<body>

<!-- VIDEO -->

<video id="introVideo" autoplay muted playsinline>
<source src="intro.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- AUDIO -->

<audio id="music" loop>
<source src="intro.mp3" type="audio/mpeg">
</audio>

<!-- BOTON CONTINUAR -->

<div id="enterButton" onclick="irMenu()">

<div class="loader"></div>

<div class="enterText">
PRESIONA PARA CONTINUAR
</div>

</div>

<!-- BOTON MUSICA -->

<div class="musicButton" onclick="toggleMusic()" id="musicBtn">
Música OFF
</div>

<script>

/* mostrar boton luego de 6 segundos */

setTimeout(function(){

document.getElementById("enterButton").style.display="flex";

},6000);


/* CONTROL MUSICA */

let music = document.getElementById("music");
let musicBtn = document.getElementById("musicBtn");
let playing = false;

function toggleMusic(){

if(!playing){

music.play();
musicBtn.innerText = "Música ON";
playing = true;

}else{

music.pause();
musicBtn.innerText = "Música OFF";
playing = false;

}

}


/* IR AL MENU */

function irMenu(){

window.location.href="menu.html";

}

</script>

</body>

</html>
