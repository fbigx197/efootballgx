```html
<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GX eFootball Federation</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial, Helvetica, sans-serif;
}

/* TITULO PROVEEDOR */

.provider{
position:fixed;
top:25px;
width:100%;
text-align:center;
color:white;
font-size:30px;
letter-spacing:7px;
font-weight:bold;
opacity:0;
animation:fadeTitle 3s ease forwards;
text-shadow:
0 0 10px rgba(59,130,246,0.9),
0 0 25px rgba(59,130,246,0.7),
0 0 40px rgba(59,130,246,0.5);
z-index:5;
}

@keyframes fadeTitle{
0%{
opacity:0;
transform:translateY(-20px);
}
100%{
opacity:1;
transform:translateY(0);
}
}

/* VIDEO */

#introVideo{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* OVERLAY OSCURO */

.overlay{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(
to bottom,
rgba(0,0,0,0.4),
rgba(0,0,0,0.75)
);
z-index:-1;
}

/* BOTON CONTINUAR */

#enterButton{
position:fixed;
bottom:80px;
left:50%;
transform:translateX(-50%);
display:none;
flex-direction:column;
align-items:center;
cursor:pointer;
}

/* LOADER */

.loader{
width:70px;
height:70px;
border:4px solid rgba(255,255,255,0.2);
border-top:4px solid #3b82f6;
border-radius:50%;
animation:spin 1s linear infinite;
box-shadow:
0 0 10px #3b82f6,
0 0 20px #3b82f6;
}

@keyframes spin{
0%{ transform:rotate(0deg); }
100%{ transform:rotate(360deg); }
}

/* TEXTO */

.enterText{
color:white;
margin-top:12px;
font-size:15px;
letter-spacing:4px;
opacity:0.9;
}

/* BOTON MUSICA */

.musicButton{
position:fixed;
bottom:20px;
left:20px;
background:rgba(0,0,0,0.6);
color:white;
padding:10px 18px;
border-radius:20px;
font-size:14px;
cursor:pointer;
border:1px solid rgba(255,255,255,0.3);
transition:0.3s;
}

.musicButton:hover{
background:rgba(255,255,255,0.1);
}

/* TRANSICION A NEGRO */

.fadeOut{
position:fixed;
width:100%;
height:100%;
background:black;
opacity:0;
pointer-events:none;
transition:opacity 1s;
z-index:20;
}

</style>

</head>

<body>

<div class="provider">
GX EFOOTBALL FEDERATION
</div>

<video id="introVideo" autoplay muted playsinline>
<source src="intro.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="fadeOut" id="fade"></div>

<audio id="music" autoplay loop>
<source src="intro.mp3" type="audio/mpeg">
</audio>

<div id="enterButton" onclick="irMenu()">

<div class="loader"></div>

<div class="enterText">
PRESIONA PARA CONTINUAR
</div>

</div>

<div class="musicButton" onclick="toggleMusic()" id="musicBtn">
Música ON
</div>

<script>

/* BOTON APARECE A LOS 9 SEGUNDOS */

setTimeout(function(){

document.getElementById("enterButton").style.display="flex";

},9000);


/* MUSICA */

let music = document.getElementById("music");
let musicBtn = document.getElementById("musicBtn");
let playing = true;

/* INTENTAR AUTOPLAY */

window.addEventListener("load", function(){

music.volume = 0.7;

music.play().catch(()=>{
console.log("Autoplay bloqueado por el navegador");
});

});

function toggleMusic(){

if(playing){

music.pause();
musicBtn.innerText = "Música OFF";
playing = false;

}else{

music.play();
musicBtn.innerText = "Música ON";
playing = true;

}

}


/* TRANSICION AL MENU */

function irMenu(){

let fade = document.getElementById("fade");

fade.style.opacity = "1";

setTimeout(function(){

window.location.href="menu.html";

},1000);

}

</script>

</body>

</html>
```
