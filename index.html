<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Torneo eFootball</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial, Helvetica, sans-serif;
}

/* VIDEO FONDO */

#introVideo{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* OVERLAY OSCURO */

.overlay{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(
to bottom,
rgba(0,0,0,0.4),
rgba(0,0,0,0.7)
);
z-index:-1;
}

/* CIRCULO */

#enterButton{

position:fixed;
bottom:70px;
left:50%;
transform:translateX(-50%);
display:none;
flex-direction:column;
align-items:center;
cursor:pointer;

}

/* loader estilo efootball */

.loader{

width:60px;
height:60px;

border:4px solid rgba(255,255,255,0.2);
border-top:4px solid white;

border-radius:50%;

animation:spin 1s linear infinite;

}

/* animacion */

@keyframes spin{

0%{ transform:rotate(0deg); }

100%{ transform:rotate(360deg); }

}

/* texto */

.enterText{

color:white;
margin-top:10px;
font-size:14px;
letter-spacing:3px;
opacity:0.9;

}

</style>

</head>

<body>

<!-- VIDEO -->

<video id="introVideo" autoplay muted playsinline>

<source src="intro.mp4" type="video/mp4">

</video>

<div class="overlay"></div>

<!-- BOTON -->

<div id="enterButton" onclick="irMenu()">

<div class="loader"></div>

<div class="enterText">
PRESIONA PARA CONTINUAR
</div>

</div>

<script>

/* mostrar boton luego de 6 segundos */

setTimeout(function(){

document.getElementById("enterButton").style.display="flex";

},6000);


/* ir al menu */

function irMenu(){

window.location.href="menu.html";

}

</script>

</body>

</html>
