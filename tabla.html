<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tabla de Posiciones - GX eFootball Federation</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:linear-gradient(140deg,#020617,#020617,#0f172a,#020617);
color:white;
min-height:100vh;
animation:fadePage 1.2s ease;
}

/* BOTON VOLVER */

.backButton{
position:absolute;
top:20px;
left:20px;
background:#1e293b;
padding:10px 18px;
border-radius:12px;
cursor:pointer;
font-size:14px;
text-decoration:none;
color:white;
transition:0.25s;
border:1px solid rgba(255,255,255,0.1);
}

.backButton:hover{
background:#2563eb;
transform:scale(1.05);
box-shadow:0 0 15px rgba(37,99,235,0.6);
}

/* ANIMACION */

@keyframes fadePage{
from{opacity:0; transform:translateY(20px)}
to{opacity:1; transform:translateY(0)}
}

h1{
text-align:center;
font-size:42px;
margin-top:40px;
letter-spacing:3px;
text-shadow:0 0 20px #2563eb;
}

/* TABLA */

.tableContainer{
width:90%;
max-width:1100px;
margin:auto;
margin-top:40px;
background:#0f172a;
border-radius:18px;
padding:30px;
box-shadow:0 0 40px rgba(0,0,0,0.7),0 0 25px rgba(37,99,235,0.2);
position:relative;
overflow:hidden;
}

table{
width:100%;
border-collapse:collapse;
text-align:center;
}

thead{
background:#1e293b;
}

thead th{
padding:14px;
}

tbody tr{
border-bottom:1px solid rgba(255,255,255,0.05);
transition:0.25s;
}

tbody tr:hover{
background:#1d4ed8;
transform:scale(1.02);
}

td{
padding:14px;
}

.team{
text-align:left;
padding-left:10px;
font-weight:600;
display:flex;
align-items:center;
gap:10px;
}

.team img{
width:26px;
height:26px;
}

.top1{background:linear-gradient(90deg,#16a34a,#15803d);}
.top2{background:linear-gradient(90deg,#2563eb,#1d4ed8);}
.top3{background:linear-gradient(90deg,#9333ea,#7e22ce);}

.points{
font-weight:800;
color:#facc15;
}

/* MINI PLAYER */

.playerMini{
position:fixed;
bottom:20px;
right:20px;
width:320px;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(6px);
border-radius:15px;
padding:12px;
display:flex;
flex-direction:column;
gap:10px;
box-shadow:0 0 15px rgba(0,0,0,0.5);
}

.playerTop{
display:flex;
align-items:center;
gap:12px;
}

.playerMini img{
width:45px;
height:45px;
border-radius:8px;
object-fit:cover;
}

.songInfo{
flex:1;
font-size:13px;
}

.songTitle{
font-weight:bold;
font-size:14px;
}

.playerControls{
display:flex;
gap:6px;
}

.ctrlBtn{
background:#111827;
border:none;
color:white;
font-size:16px;
padding:6px 8px;
border-radius:6px;
cursor:pointer;
}

.ctrlBtn:hover{
background:#3b82f6;
}

.progressBar{
width:100%;
}

.time{
display:flex;
justify-content:space-between;
font-size:11px;
opacity:0.8;
}

.volumeControl{
display:flex;
align-items:center;
gap:8px;
font-size:12px;
}

.volumeControl input{
width:100%;
}

</style>

</head>

<body>

<audio id="music"></audio>

<a class="backButton" href="menu.html">
← Volver al menú
</a>

<h1>Tabla de Posiciones</h1>

<div class="tableContainer">

<table>

<thead>
<tr>

<th>PJ</th>

<th>E</th>

<th>PTS</th>
</tr>
</thead>

<tbody>

<tr class="top1">
<td>1</td>

</tr>

<tr class="top2">
<td>2</td>
<td class="team"><img src="mancity.png">Lucas</td>
<td>17</td><td>10</td><td>5</td><td>2</td>
<td>28</td><td>15</td><td>+13</td>
<td class="points">35</td>
</tr>

<tr class="top3">
<td>3</td>
<td class="team"><img src="barcelona.png">Mateo</td>
<td>18</td><td>9</td><td>4</td><td>5</td>
<td>26</td><td>22</td><td>+4</td>

</tr>

<tr>
<td>4</td>
<td class="team"><img src="juventus.png">Carlos</td>

<tr>
<td>5</td>

<tr>

</table>

</div>

<!-- MINI PLAYER -->

<div class="playerMini">

<div class="playerTop">

<img id="cover" src="badbunny.png">

<div class="songInfo">
<div>Reproduciendo:</div>
<div class="songTitle" id="songTitle">Cargando...</div>
</div>

<div class="playerControls">
<button class="ctrlBtn" onclick="prevSong()">⏮</button>
<button class="ctrlBtn" onclick="togglePlay()">⏯</button>
<button class="ctrlBtn" onclick="nextSong()">⏭</button>
</div>

</div>

<input type="range" id="progress" class="progressBar" value="0" step="1">

<div class="time">
<span id="currentTime">0:00</span>
<span id="duration">0:00</span>
</div>

<div class="volumeControl">
🔊
<input type="range" min="0" max="1" step="0.01" value="0.6" onchange="setVolume(this.value)">
</div>

</div>

<script>

let music = document.getElementById("music");
let progress = document.getElementById("progress");

let songs = [

{title:"Bad Bunny - EoO",file:"eoo.mp3",cover:"badbunny.png"},
{title:"Bad Bunny - Baile Inolvidable",file:"baile.mp3",cover:"badbunny.png"},
{title:"Fuerza Regida - Coqueta",file:"COQUETA.mp3",cover:"coqueta.jfif"},
{title:"Bad Bunny - NUEVAYoL",file:"NUEVAYoL.mp3",cover:"badbunny.png"},
{title:"Michel Telo - Ai se eu te peg",file:"mosa.mp3",cover:"mosa.jfif"}

];

let currentSong = parseInt(localStorage.getItem("songIndex")) || 0;
let savedTime = parseFloat(localStorage.getItem("songTime")) || 0;
let playing=false;

function loadSong(){

music.src=songs[currentSong].file;

document.getElementById("songTitle").innerText=songs[currentSong].title;
document.getElementById("cover").src=songs[currentSong].cover;

music.currentTime=savedTime;

music.play();
playing=true;

}

function nextSong(){

currentSong++;
if(currentSong>=songs.length){currentSong=0;}

savedTime=0;
loadSong();

}

function prevSong(){

currentSong--;
if(currentSong<0){currentSong=songs.length-1;}

savedTime=0;
loadSong();

}

function togglePlay(){

if(playing){
music.pause();
playing=false;
}else{
music.play();
playing=true;
}

}

function setVolume(v){
music.volume=v;
}

music.addEventListener("timeupdate",function(){

progress.value=music.currentTime;

document.getElementById("currentTime").innerText=formatTime(music.currentTime);
document.getElementById("duration").innerText=formatTime(music.duration);

localStorage.setItem("songIndex",currentSong);
localStorage.setItem("songTime",music.currentTime);

});

music.addEventListener("loadedmetadata",function(){
progress.max=music.duration;
});

progress.addEventListener("input",function(){
music.currentTime=progress.value;
});

music.addEventListener("ended",function(){
nextSong();
});

function formatTime(t){

if(isNaN(t)) return "0:00";

let m=Math.floor(t/60);
let s=Math.floor(t%60);

if(s<10)s="0"+s;

return m+":"+s;

}

loadSong();
music.volume=0.6;

</script>

</body>
</html>
