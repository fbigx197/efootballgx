<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GX eFootball Federation</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#06080f;
color:white;
}

/* BARRA SUPERIOR */

.topbar{

display:flex;
justify-content:center;
gap:60px;

background:#0f172a;

padding:15px;

font-size:18px;

}

.topbar div{

opacity:0.8;
cursor:pointer;
transition:0.3s;

}

.topbar div:hover{

opacity:1;
color:#3b82f6;

}

/* PANEL CENTRAL */

.mainPanel{

margin:40px auto;

width:90%;
max-width:1000px;

height:220px;

background:linear-gradient(135deg,#111827,#1f2937);

border-radius:15px;

display:flex;
align-items:center;
justify-content:center;

font-size:40px;

opacity:0.9;

}

/* GRID MENU */

.menuGrid{

display:flex;
justify-content:center;

gap:20px;

margin-top:40px;

flex-wrap:wrap;

}

/* BOTONES */

.tile{

width:170px;
height:110px;

border-radius:15px;

display:flex;
flex-direction:column;

align-items:center;
justify-content:center;

font-size:18px;

cursor:pointer;

transition:0.25s;

text-decoration:none;
color:white;

}

.tile:hover{

transform:scale(1.08);

}

/* COLORES */

.tile1{ background:#374151; }
.tile2{ background:#06b6d4; }
.tile3{ background:#84cc16; }
.tile4{ background:#ef4444; }
.tile5{ background:#a855f7; }

/* TEXTO TILE */

.tile span{

margin-top:8px;

font-size:16px;

}

/* FOOTER */

.footer{

text-align:center;

margin-top:40px;

opacity:0.5;

font-size:14px;

}

</style>

</head>

<body>

<!-- MUSICA CONTINUA -->

<audio autoplay loop>
<source src="intro.mp3" type="audio/mpeg">
</audio>

<!-- BARRA SUPERIOR -->

<div class="topbar">

<div>eFootball World</div>
<div>Federation</div>
<div>Torneos</div>
<div>Extras</div>

</div>

<!-- PANEL CENTRAL -->

<div class="mainPanel">

GX EFOOTBALL FEDERATION

</div>

<!-- MENU PRINCIPAL -->

<div class="menuGrid">

<a class="tile tile1" href="jugadores.html">
👥
<span>Jugadores</span>
</a>

<a class="tile tile2" href="fixture.html">
⚽
<span>Fixture</span>
</a>

<a class="tile tile3" href="tabla.html">
📊
<span>Tabla</span>
</a>

<a class="tile tile4" href="bracket.html">
🏆
<span>Llaves</span>
</a>

<a class="tile tile5" href="reglas.html">
📜
<span>Reglas</span>
</a>

</div>

<div class="footer">

GX eFootball Federation 2026

</div>

</body>

</html>
