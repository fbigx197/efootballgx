<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GX eFootball Federation</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
background-image:url("fondo.webp");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* OSCURECER FONDO */

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
z-index:-1;
}

/* BARRA SUPERIOR */

.topbar{
display:flex;
justify-content:center;
gap:60px;
background:rgba(0,0,0,0.6);
padding:15px;
font-size:18px;
}

.topbar div{
opacity:0.8;
cursor:pointer;
transition:0.3s;
}

.topbar div:hover{
opacity:1;
color:#3b82f6;
}

/* PANEL CENTRAL */

.mainPanel{
margin:40px auto;
width:90%;
max-width:1000px;
height:220px;
background:linear-gradient(135deg,#111827,#1f2937);
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
opacity:0.9;
}

/* GRID MENU */

.menuGrid{
display:flex;
justify-content:center;
gap:20px;
margin-top:40px;
flex-wrap:wrap;
}

/* BOTONES */

.tile{
width:170px;
height:110px;
border-radius:15px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-size:18px;
cursor:pointer;
transition:0.25s;
text-decoration:none;
color:white;
}

.tile:hover{
transform:scale(1.08);
}

.tile1{ background:#374151; }
.tile2{ background:#06b6d4; }
.tile3{ background:#84cc16; }
.tile4{ background:#ef4444; }
.tile5{ background:#a855f7; }

.tile span{
margin-top:8px;
font-size:16px;
}

/* FOOTER */

.footer{
text-align:center;
margin-top:40px;
opacity:0.6;
font-size:14px;
}

/* MINI PLAYER */

.playerMini{

position:fixed;
bottom:20px;
right:20px;

width:320px;

background:rgba(0,0,0,0.75);
backdrop-filter:blur(6px);

border-radius:15px;
padding:12px;

display:flex;
flex-direction:column;
gap:10px;

box-shadow:0 0 15px rgba(0,0,0,0.5);

}

/* FILA SUPERIOR */

.playerTop{
display:flex;
align-items:center;
gap:12px;
}

.playerMini img{
width:45px;
height:45px;
border-radius:8px;
object-fit:cover;
}

.songInfo{
flex:1;
font-size:13px;
}

.songTitle{
font-weight:bold;
font-size:14px;
}

/* CONTROLES */

.playerControls{
display:flex;
gap:6px;
}

.ctrlBtn{
background:#111827;
border:none;
color:white;
font-size:16px;
padding:6px 8px;
border-radius:6px;
cursor:pointer;
transition:0.2s;
}

.ctrlBtn:hover{
background:#3b82f6;
}

/* PROGRESO */

.progressBar{
width:100%;
}

/* TIEMPO */

.time{
display:flex;
justify-content:space-between;
font-size:11px;
opacity:0.8;
}

/* VOLUMEN */

.volumeControl{
display:flex;
align-items:center;
gap:8px;
font-size:12px;
}

.volumeControl input{
width:100%;
}

</style>

</head>

<body>

<div class="overlay"></div>

<audio id="music"></audio>

<div class="topbar">
<div>eFootball World</div>
<div>Federation</div>
<div>Torneos</div>
<div>Extras</div>
</div>

<div class="mainPanel">
GX EFOOTBALL FEDERATION
</div>

<div class="menuGrid">

<a class="tile tile1" href="jugadores.html">
👥
<span>Jugadores</span>
</a>

<a class="tile tile2" href="fixture.html">
⚽
<span>Fixture</span>
</a>

<a class="tile tile3" href="tabla.html">
📊
<span>Tabla</span>
</a>

<a class="tile tile4" href="bracket.html">
🏆
<span>Llaves</span>
</a>


<div class="footer">
GX eFootball Federation 2026
</div>

<!-- MINI PLAYER -->

<div class="playerMini">

<div class="playerTop">

<img id="cover" src="cover1.jpg">

<div class="songInfo">
<div>Reproduciendo:</div>
<div class="songTitle" id="songTitle">Canción 1</div>
</div>

<div class="playerControls">

<button class="ctrlBtn" onclick="prevSong()">⏮</button>
<button class="ctrlBtn" onclick="togglePlay()">⏯</button>
<button class="ctrlBtn" onclick="nextSong()">⏭</button>

</div>

</div>

<input type="range" id="progress" class="progressBar" value="0" step="1">

<div class="time">
<span id="currentTime">0:00</span>
<span id="duration">0:00</span>
</div>

<div class="volumeControl">
🔊
<input type="range" min="0" max="1" step="0.01" value="0.6" onchange="setVolume(this.value)">
</div>

</div>

<script>

let music = document.getElementById("music");
let progress = document.getElementById("progress");

let songs = [

{
title:"Bad Bunny - EoO",
file:"eoo.mp3",
cover:"badbunny.png"
},

{
title:"Bad Bunny - Baile Inolvidable",
file:"baile.mp3",
cover:"badbunny.png"
},

{
title:"- Fuerza Rediga - Coqueta",
file:"COQUETA.mp3",
cover:"coqueta.jfif"
},
  
{
title:"Bad Bunny - NUEVAYoL",
file:"NUEVAYoL.mp3",
cover:"badbunny.png"
},

{
title:"Michel Telo - Ai se eu te peg",
file:"mosa.mp3",
cover:"mosa.jfif"
}

];

let currentSong = 0;
let playing = false;

function loadSong(){

music.src = songs[currentSong].file;

document.getElementById("songTitle").innerText = songs[currentSong].title;
document.getElementById("cover").src = songs[currentSong].cover;

music.play();
playing=true;

}

function nextSong(){

currentSong++;

if(currentSong>=songs.length){
currentSong=0;
}

loadSong();

}

function prevSong(){

currentSong--;

if(currentSong<0){
currentSong=songs.length-1;
}

loadSong();

}

function togglePlay(){

if(playing){
music.pause();
playing=false;
}else{
music.play();
playing=true;
}

}

function setVolume(value){
music.volume=value;
}

/* ACTUALIZAR PROGRESO */

music.addEventListener("timeupdate",function(){

progress.value=music.currentTime;

let current=formatTime(music.currentTime);
let total=formatTime(music.duration);

document.getElementById("currentTime").innerText=current;
document.getElementById("duration").innerText=total;

});

/* CUANDO CARGA */

music.addEventListener("loadedmetadata",function(){

progress.max=music.duration;

});

/* MOVER PROGRESO */

progress.addEventListener("input",function(){

music.currentTime=progress.value;

});

/* AUTO SIGUIENTE */

music.addEventListener("ended",function(){

nextSong();

});

/* FORMATO TIEMPO */

function formatTime(time){

if(isNaN(time)) return "0:00";

let minutes=Math.floor(time/60);
let seconds=Math.floor(time%60);

if(seconds<10) seconds="0"+seconds;

return minutes+":"+seconds;

}

/* INICIO */

loadSong();
music.volume=0.6;

</script>

</body>

</html>
