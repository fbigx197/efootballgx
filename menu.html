<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GX eFootball Federation</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;

/* FONDO */

background-image:url("fondo.webp");
background-size:cover;
background-position:center;
background-attachment:fixed;

}

/* OSCURECER FONDO */

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
z-index:-1;
}

/* BARRA SUPERIOR */

.topbar{
display:flex;
justify-content:center;
gap:60px;
background:rgba(0,0,0,0.6);
padding:15px;
font-size:18px;
}

.topbar div{
opacity:0.8;
cursor:pointer;
transition:0.3s;
}

.topbar div:hover{
opacity:1;
color:#3b82f6;
}

/* PANEL CENTRAL */

.mainPanel{
margin:40px auto;
width:90%;
max-width:1000px;
height:220px;
background:linear-gradient(135deg,#111827,#1f2937);
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
opacity:0.9;
}

/* GRID MENU */

.menuGrid{
display:flex;
justify-content:center;
gap:20px;
margin-top:40px;
flex-wrap:wrap;
}

/* BOTONES */

.tile{
width:170px;
height:110px;
border-radius:15px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-size:18px;
cursor:pointer;
transition:0.25s;
text-decoration:none;
color:white;
}

.tile:hover{
transform:scale(1.08);
}

/* COLORES */

.tile1{ background:#374151; }
.tile2{ background:#06b6d4; }
.tile3{ background:#84cc16; }
.tile4{ background:#ef4444; }
.tile5{ background:#a855f7; }

.tile span{
margin-top:8px;
font-size:16px;
}

/* FOOTER */

.footer{
text-align:center;
margin-top:40px;
opacity:0.6;
font-size:14px;
}

/* BOTON MUSICA */

.musicButton{
position:fixed;
bottom:20px;
left:20px;
background:rgba(0,0,0,0.6);
color:white;
padding:10px 18px;
border-radius:20px;
font-size:14px;
cursor:pointer;
border:1px solid rgba(255,255,255,0.3);
transition:0.3s;
}

.musicButton:hover{
background:rgba(255,255,255,0.15);
}

/* MINI PLAYER */

.playerMini{

position:fixed;

bottom:20px;
right:20px;

width:280px;

background:rgba(0,0,0,0.75);

backdrop-filter:blur(6px);

border-radius:15px;

padding:12px;

display:flex;

align-items:center;

gap:12px;

box-shadow:0 0 15px rgba(0,0,0,0.5);

}

/* COVER */

.playerMini img{

width:45px;
height:45px;

border-radius:8px;

object-fit:cover;

}

/* INFO */

.songInfo{

flex:1;

font-size:13px;

}

.songTitle{

font-weight:bold;

font-size:14px;

}

/* CONTROLES */

.playerControls{

display:flex;

gap:6px;

}

.ctrlBtn{

background:#111827;

border:none;

color:white;

font-size:16px;

padding:6px 8px;

border-radius:6px;

cursor:pointer;

transition:0.2s;

}

.ctrlBtn:hover{

background:#3b82f6;

}

</style>

</head>

<body>

<div class="overlay"></div>

<!-- AUDIO -->

<audio id="music" autoplay></audio>

<!-- BARRA SUPERIOR -->

<div class="topbar">
<div>eFootball World</div>
<div>Federation</div>
<div>Torneos</div>
<div>Extras</div>
</div>

<!-- PANEL -->

<div class="mainPanel">
GX EFOOTBALL FEDERATION
</div>

<!-- MENU -->

<div class="menuGrid">

<a class="tile tile1" href="jugadores.html">
👥
<span>Jugadores</span>
</a>

<a class="tile tile2" href="fixture.html">
⚽
<span>Fixture</span>
</a>

<a class="tile tile3" href="tabla.html">
📊
<span>Tabla</span>
</a>

<a class="tile tile4" href="bracket.html">
🏆
<span>Llaves</span>
</a>

<a class="tile tile5" href="reglas.html">
📜
<span>Reglas</span>
</a>

</div>

<div class="footer">
GX eFootball Federation 2026
</div>

<!-- BOTON MUSICA -->

<div class="musicButton" onclick="toggleMusic()" id="musicBtn">
Música ON
</div>

<!-- MINI REPRODUCTOR -->

<div class="playerMini">

<img id="cover" src="cover1.jpg">

<div class="songInfo">
<div>Reproduciendo:</div>
<div class="songTitle" id="songTitle">Canción 1</div>
</div>

<div class="playerControls">

<button class="ctrlBtn" onclick="prevSong()">⏮</button>
<button class="ctrlBtn" onclick="nextSong()">⏭</button>

</div>

</div>

<script>

let music = document.getElementById("music");
let musicBtn = document.getElementById("musicBtn");

let songs = [

{
title:"Michel Telo - Ai se eu te pego",
file:"mosa.mp3",
cover:"cover1.jpg"
},

{
title:"Bad Bunny - Baile Inolvidable",
file:"baile.mp3",
cover:"cover2.jpg"
},

{
title:"Canción 3",
file:"song3.mp3",
cover:"cover3.jpg"
},

{
title:"Canción 4",
file:"song4.mp3",
cover:"cover4.jpg"
},

{
title:"Canción 5",
file:"song5.mp3",
cover:"cover5.jpg"
}

];

let currentSong = 0;

function loadSong(){

music.src = songs[currentSong].file;

document.getElementById("songTitle").innerText = songs[currentSong].title;

document.getElementById("cover").src = songs[currentSong].cover;

music.play();

}

function nextSong(){

currentSong++;

if(currentSong >= songs.length){
currentSong = 0;
}

loadSong();

}

function prevSong(){

currentSong--;

if(currentSong < 0){
currentSong = songs.length - 1;
}

loadSong();

}

let playing = true;

function toggleMusic(){

if(playing){

music.pause();
musicBtn.innerText="Música OFF";
playing=false;

}else{

music.play();
musicBtn.innerText="Música ON";
playing=true;

}

}

/* CARGAR PRIMERA */

loadSong();

</script>

</body>
</html>
